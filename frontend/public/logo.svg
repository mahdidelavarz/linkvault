<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="NeoVault logo">
  <defs>
    <linearGradient id="nv-bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="nv-yellow" x1="96" y1="96" x2="416" y2="416" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- App-icon background (matches PWA theme/background_color) -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#nv-bg)"/>

  <!-- Safe feet -->
  <g fill="#0f172a">
    <rect x="150" y="402" width="34" height="20" rx="5"/>
    <rect x="328" y="402" width="34" height="20" rx="5"/>
  </g>

  <!-- Hinges on the left edge -->
  <g fill="#0f172a">
    <rect x="86" y="172" width="20" height="44" rx="5"/>
    <rect x="86" y="300" width="20" height="44" rx="5"/>
  </g>

  <!-- Vault body -->
  <rect x="96" y="104" width="320" height="304" rx="46" fill="url(#nv-yellow)"/>

  <!-- Door handle on the right edge -->
  <rect x="398" y="214" width="22" height="84" rx="11" fill="#0f172a"/>

  <!-- Door panel outline -->
  <rect x="132" y="140" width="248" height="232" rx="30" fill="none" stroke="#0f172a" stroke-width="9" stroke-opacity="0.85"/>

  <!-- Combination dial -->
  <circle cx="256" cy="190" r="27" fill="#0f172a"/>
  <line x1="256" y1="172" x2="256" y2="182" stroke="#FBBF24" stroke-width="6" stroke-linecap="round"/>

  <!-- The "V" on the door -->
  <path d="M196 226 L256 334 L316 226" fill="none" stroke="#0f172a" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Bolt at the V vertex -->
  <circle cx="256" cy="334" r="13" fill="#FBBF24"/>
</svg>
